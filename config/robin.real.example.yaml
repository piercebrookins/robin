runtime:
  deployment_mode: real
  environment: production
  log_level: INFO
  max_concurrent_tasks: 2
  acknowledgement_deadline_ms: 4000
  speech_floor_silence_ms: 400
  speech_floor_max_wait_ms: 3000
  min_free_disk_mb: 512

model:
  primary: gpt-5.6
  intent_confidence_accept: 0.75
  intent_confidence_confirm: 0.60
  intent_timeout_seconds: 4.0

audio:
  capture:
    provider: screen_capture_kit
    bundle_id: "com.google.Chrome"
    sample_rate: 24000
    channels: 1
    encoding: "pcm_s16le"
    frame_duration_ms: 100
    sample_duration_ms: 1500
    loop_interval_ms: 500
  transcription:
    provider: openai_realtime
    model: "gpt-realtime-whisper"
    language: "en"
    vad_threshold: 0.5
    prefix_padding_ms: 300
    silence_duration_ms: 500
  speech:
    provider: openai
    model: "gpt-4o-mini-tts"
    voice: "alloy"
    response_format: "pcm"
    cooldown_ms: 700
  bridge:
    provider: process
    executable: "./apps/macos-bridge/.build/debug/robin-macos-bridge"
  routing:
    tts_output_device_uid: "REPLACE_WITH_ROBIN_LOOPBACK_OUTPUT_UID"
    meet_microphone_label: "Robin Microphone"
    meet_speaker_label: "Robin Speaker"
    allow_default_output_fallback: false
    legacy_output_device_name: "BlackHole 2ch"

browser:
  meet_base_url: "https://meet.google.com"
  automation_mode: "playwright"
  connection_mode: "cdp"
  cdp_endpoint: "http://127.0.0.1:9222"
  allowed_meet_hosts: ["meet.google.com"]
  executable_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
  profile_dir: "~/Library/Application Support/Robin/Chrome"
  recovery_screenshot_dir: "./robinworkspace/sessions/browser-recovery"
  headless: false
  use_fake_media_ui: false
  remote_debugging_port: 9222
  navigation_timeout_ms: 30000
  prejoin_timeout_ms: 20000
  admission_timeout_ms: 120000
  ui_action_retries: 1
  ui_recovery_pause_ms: 250
  share_dialog_mode: "cua_driver"
  share_source_title: "Robin Presentation"
  share_dialog_timeout_ms: 10000
  share_dialog_retries: 1
  share_dialog_poll_interval_ms: 250
  computer_use_command: "cua-driver"

workspace:
  root: "./robinworkspace"
  source_dir: "source-data"
  generated_dir: "generated"
  sessions_dir: "sessions"
  max_file_size_mb: 50
  allowed_extensions: [".csv", ".xlsx", ".pdf"]

presentation:
  base_url: "http://127.0.0.1:3000/present"
  default_slide_count: 4
  hand_raise_handoff_enabled: true
  require_wake_word_for_invitation: true

database:
  path: "./robinworkspace/robin.db"

calendar:
  enabled: false
  provider: "local"
  file_path: "./robinworkspace/source-data/calendar_demo.ics"
  lookahead_hours: 12
  auto_join: false
  join_early_seconds: 60
