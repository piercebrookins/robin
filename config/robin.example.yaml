runtime:
  environment: development
  log_level: INFO
  max_concurrent_tasks: 2
  acknowledgement_deadline_ms: 4000
  speech_floor_silence_ms: 400
  speech_floor_max_wait_ms: 3000
  min_free_disk_mb: 512
  max_peak_rss_mb: 1024
  max_workspace_disk_mb: 2048

model:
  primary: gpt-5.6
  agent_max_iterations: 8
  agent_max_source_chars: 24000
  intent_confidence_accept: 0.75
  intent_confidence_confirm: 0.60
  intent_timeout_seconds: 4.0

audio:
  mode: "openai"
  bridge_mode: "process"
  # For native bridge mode after `swift build --package-path apps/macos-bridge`:
  # bridge_mode: "process"
  # bridge_executable: "./apps/macos-bridge/.build/debug/robin-macos-bridge"
  bridge_executable: "./apps/macos-bridge/.build/debug/robin-macos-bridge"
  capture_bundle_id: "com.google.Chrome"
  # Longer windows plus a local RMS gate avoid uploading silent clips.
  capture_sample_duration_ms: 4000
  capture_loop_interval_ms: 250
  silence_rms_threshold: 0.002
  openai_timeout_seconds: 20
  openai_max_retries: 1
  speech_model: "gpt-4o-mini-tts"
  transcription_model: "gpt-4o-mini-transcribe"
  realtime_transcription_enabled: true
  realtime_transcription_model: "gpt-realtime-whisper"
  realtime_transcription_delay: "low"
  realtime_vad_silence_ms: 550
  realtime_vad_min_speech_ms: 180
  realtime_chunk_bytes: 2400
  speech_voice: "alloy"
  speech_format: "wav"
  streaming_speech_enabled: true
  streaming_speech_chunk_bytes: 4800
  streaming_speech_sample_rate: 24000
  output_device_name: "BlackHole 2ch"
  post_speech_cooldown_ms: 700
  simulator_transcript: "Robin, use the finance files to compare the quarterly results and make slides."

browser:
  meet_base_url: "https://meet.google.com"
  automation_mode: "playwright"
  connection_mode: "cdp"
  cdp_endpoint: "http://127.0.0.1:9222"
  allowed_meet_hosts: ["meet.google.com"]
  # For real Google Meet control:
  # automation_mode: "playwright"
  # connection_mode: "cdp"
  # executable_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
  executable_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
  profile_dir: "~/Library/Application Support/Robin/Chrome"
  recovery_screenshot_dir: "./RobinWorkspace/sessions/browser-recovery"
  headless: false
  use_fake_media_ui: true
  remote_debugging_port: 9222
  navigation_timeout_ms: 30000
  prejoin_timeout_ms: 20000
  admission_timeout_ms: 120000
  ui_action_retries: 1
  ui_recovery_pause_ms: 250
  # Real Meet mode uses Codex/macOS Computer Use only for Chrome-owned dialogs.
  share_dialog_mode: "cua_driver"
  share_source_title: "Robin Presentation"
  share_dialog_timeout_ms: 10000
  share_dialog_retries: 1
  share_dialog_poll_interval_ms: 250
  computer_use_command: "cua-driver"
  captions_enabled: true

workspace:
  root: "./RobinWorkspace"
  source_dir: "source-data"
  generated_dir: "generated"
  sessions_dir: "sessions"
  max_file_size_mb: 50
  allowed_extensions: [".csv", ".xlsx", ".pdf", ".pptx", ".txt", ".md"]

presentation:
  base_url: "http://127.0.0.1:3000/present"
  default_slide_count: 4
  narration_prefetch_enabled: true
  narration_prefetch_concurrency: 2
  hand_raise_handoff_enabled: true
  require_wake_word_for_invitation: true

database:
  path: "./RobinWorkspace/robin.db"

calendar:
  enabled: false
  provider: "local"
  file_path: "./RobinWorkspace/source-data/calendar_demo.ics"
  lookahead_hours: 12
  auto_join: false
  join_early_seconds: 60
