name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  node:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm audit --audit-level=moderate
  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: swift build -c release --package-path apps/mac-helper
